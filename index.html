<!DOCTYPE html>
<html>
<head>
<title>Master Club</title>

<style>
body{
background:#121212;
color:white;
font-family:Arial,sans-serif;
text-align:center;
padding-top:40px;
}

h1{
color:gold;
font-size:40px;
margin-bottom:10px;
}

.tagline{
color:#ccc;
margin-bottom:20px;
}

#timer{
font-size:50px;
margin:20px;
}

button{
padding:15px 30px;
font-size:20px;
margin:10px;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

.green{
background:green;
}

.red{
background:red;
}

#result{
font-size:24px;
margin-top:20px;
font-weight:bold;
}

.choice{
margin-top:15px;
font-size:18px;
color:gold;
}
</style>

</head>
<body>

<h1>Master Club</h1>

<p class="tagline">Predict • Play • Win</p>

<h2>Time Remaining</h2>

<div id="timer">10</div>

<button class="green" onclick="predict('GREEN')">
GREEN
</button>

<button class="red" onclick="predict('RED')">
RED
</button>

<div class="choice" id="choice">
No Prediction Selected
</div>

<h2 id="result"></h2>

<script>

let choice = "";
let time = 10;

function predict(color){
choice = color;
document.getElementById("choice").innerText =
"Your Prediction: " + color;
}

setInterval(function(){

time--;

document.getElementById("timer").innerText = time;

if(time === 0){

let result =
Math.random() < 0.5 ? "GREEN" : "RED";

if(choice === ""){

document.getElementById("result").innerText =
"Result: " + result;

}else if(choice === result){

document.getElementById("result").innerText =
"🎉 You Win! Result: " + result;

}else{

document.getElementById("result").innerText =
"❌ You Lose! Result: " + result;

}

time = 10;
choice = "";

document.getElementById("choice").innerText =
"No Prediction Selected";

}

},1000);

</script>

</body>
</html>
